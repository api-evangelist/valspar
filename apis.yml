description: >-
  The Valspar Corporation was a global manufacturer of paints and coatings founded in
  1806 before being acquired by Sherwin-Williams in 2017 for approximately $11.3 billion.
  Valspar continues to operate as a brand within Sherwin-Williams, offering consumer
  paints, industrial coatings, and protective coatings. Digital tools include color
  visualizers, virtual painters, and color consultation services. No public developer
  API is available; color and product integrations are available through Sherwin-Williams'
  partner programs including BIMsmith and Autodesk Revit.
